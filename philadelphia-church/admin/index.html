<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philadelphia Church — Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #042C53; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .loading {
      text-align: center; color: white;
    }
    .cross { font-size: 48px; margin-bottom: 1rem; display: block; }
    .loading h2 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }
    .loading p { font-size: 14px; opacity: 0.7; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <span class="cross">✝</span>
    <h2>Philadelphia Church Admin</h2>
    <p>பிலடெல்பியா சபை நிர்வாகம்</p>
    <div class="spinner"></div>
  </div>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
