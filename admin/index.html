<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philadelphia Church Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:#042C53;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{text-align:center;color:white}
    .cross{font-size:48px;margin-bottom:1rem;display:block}
    h2{font-size:20px;font-weight:500;margin-bottom:4px}
    p{font-size:14px;opacity:.7;margin-bottom:1.5rem}
    .spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="box">
    <span class="cross">✝</span>
    <h2>Philadelphia Church Admin</h2>
    <p>பிலடெல்பியா சபை நிர்வாகம்</p>
    <div class="spin"></div>
  </div>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
